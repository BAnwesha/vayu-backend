spring.application.name=vayu-backend
server.port=8080

# Weather API Configuration
weather.api.url=https://api.openweathermap.org/data/2.5/weather?q={city}&appid={apiKey}&units=metric
weather.api.key=b1d783bb04ac83a9da570f1a9893c722

# Name our circuit breaker 'openWeatherApi'
resilience4j.circuitbreaker.instances.openWeatherApi.sliding-window-size=10
resilience4j.circuitbreaker.instances.openWeatherApi.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.openWeatherApi.wait-duration-in-open-state=20s
resilience4j.circuitbreaker.instances.openWeatherApi.permitted-numberOfCalls-in-half-open-state=3

spring.data.redis.host=localhost
spring.data.redis.port=6379